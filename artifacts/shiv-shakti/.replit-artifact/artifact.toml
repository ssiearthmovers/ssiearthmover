kind = "web"
previewPath = "/"
title = "Shiv Shakti International"
version = "1.0.0"
id = "artifacts/shiv-shakti"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23406

[services.development]
run = "npm run dev -w @workspace/shiv-shakti"

[services.production]
build = [ "npm", "run", "build", "-w", "@workspace/shiv-shakti" ]
publicDir = "artifacts/shiv-shakti/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23406"
BASE_PATH = "/"
